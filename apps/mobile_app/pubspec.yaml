name: adc_delivery_mobile
description: "ADC Delivery System - Mobile App cho Giao nhận"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # Routing
  go_router: ^14.2.0

  # State management
  flutter_riverpod: ^2.5.0

  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.4.0
  flutter_cache_manager: ^3.3.2
  google_sign_in: ^6.2.0
  google_fonts: ^6.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
